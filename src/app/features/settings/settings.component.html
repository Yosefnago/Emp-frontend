<!-- settings.component.html -->
<div class="settings-container">
  <!-- Header -->
  <div class="settings-header">
    <button class="back-button" (click)="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>חזור</span>
    </button>
    <div class="header-content">
      <h1 class="page-title">הגדרות</h1>
      <p class="page-subtitle">ניהול הגדרות אישיות</p>
    </div>
  </div>

  <!-- Settings Tabs -->
  <div class="tabs-section">
    <div class="tabs-header">
      <button class="tab-button" [class.active]="activeTab === 'profile'" (click)="switchTab('profile')">
        פרופיל חברה
      </button>
      <button class="tab-button" [class.active]="activeTab === 'security'" (click)="switchTab('security')">
        אבטחה
      </button>
    </div>
  </div>

  <!-- Profile Tab -->
  @if (activeTab === 'profile') {
  <section class="settings-section">
    <div class="section-header">
      <h2 class="section-title">פרופיל חברה</h2>
      <p class="section-subtitle">עדכן את פרטי החברה </p>
    </div>

    <div class="profile-content">

      <!-- Profile Form -->
      <form #profileForm="ngForm" (ngSubmit)="saveProfile()" class="settings-form">
        <div class="form-grid">

          <div class="form-group">
            <label class="form-label">שם משתמש</label>
            <input class="form-input" type="text" [(ngModel)]="username" name="username" placeholder="שם משתמש"
              [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

          <div class="form-group">
            <label class="form-label">שם חברה</label>
            <input class="form-input" type="text" [(ngModel)]="companyName" name="companyName" placeholder="שם חברה"
              [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

          <div class="form-group">
            <label class="form-label">ח.פ חברה</label>
            <input class="form-input" type="text" [(ngModel)]="companyId" name="companyId" placeholder="ח.פ חברה"
              [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

          <div class="form-group">
            <label class="form-label">כתובת</label>
            <input class="form-input" type="text" [(ngModel)]="companyAddress" name="companyAddress"
              placeholder="כתובת החברה" [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

          <div class="form-group full-width">
            <label class="form-label">דוא"ל</label>
            <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="example@domain.com"
              [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

          <div class="form-group">
            <label class="form-label">מספר טלפון</label>
            <input class="form-input" type="tel" [(ngModel)]="phone" name="phone" placeholder="05X-XXXXXXX"
              maxlength="10" [readonly]="!isEditingProfile" [class.readonly]="!isEditingProfile">
          </div>

        </div>

        <div class="form-actions">
          @if (!isEditingProfile) {
          <button type="button" class="submit-btn" (click)="toggleEditProfile()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
            </svg>
            ערוך פרטים
          </button>
          } @else {
          <button type="submit" class="submit-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
            </svg>
            שמור שינויים
          </button>
          <button type="button" class="cancel-btn" (click)="cancelEditProfile()">
            ביטול
          </button>
          }
        </div>
      </form>
    </div>
  </section>
  }

  <!-- Security Tab -->
  @if (activeTab === 'security') {
  <section class="settings-section">
    <div class="section-header">
      <h2 class="section-title">אבטחה</h2>
      <p class="section-subtitle">ניהול סיסמאות ואבטחת חשבון</p>
    </div>

    <form (ngSubmit)="saveSecurity()" class="settings-form">
      <div class="form-grid">
        <div class="form-group full-width">
          <label class="form-label">סיסמה נוכחית</label>
          <input class="form-input" type="password" [(ngModel)]="passwordData.oldPass" name="currentPassword"
            placeholder="הזן סיסמה נוכחית">
        </div>

        <div class="form-group full-width">
          <label class="form-label">סיסמה חדשה</label>
          <input class="form-input" type="password" [(ngModel)]="passwordData.newPass" name="newPassword"
            placeholder="הזן סיסמה חדשה">
        </div>

        <div class="form-group full-width">
          <label class="form-label">אימות סיסמה חדשה</label>
          <input class="form-input" type="password" [(ngModel)]="passwordData.newPassAgain" name="confirmPassword"
            placeholder="הזן שוב את הסיסמה החדשה">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
          </svg>
          עדכן סיסמה
        </button>
      </div>
    </form>
  </section>
  }





</div>
